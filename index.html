<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Websketch 2.0</title>
</head>
<body>
<div class="content">
<!---->
<div class="index-content">
<!--------->

    <div class="websketch">


        <!-- Top label -->
        <div class="top-label">Websketch by Noel Bustillos</div>
        
        <!-- Drawing screen -->
        <div class="screen-frame">
            <canvas id="drawing-canvas" ></canvas>
        </div>
        <!-- reset button -->
        <div>
            <div id="shake-button"></div>
        </div>
        <p>Clear screen</p>
        
        <!-- Control section -->
        <div class="control-section">
            
            <!-- Horizontal buttons -->
            <div class="lr-button">
                <div id="left-button">left</div>
                <div id="right-button">right</div>
            </div>
            <!-- Vertical buttons -->
            <div class="ud-button">
                <div id="up-button">up</div>
                <div id="down-button">down</div>
            </div>

        </div>


    </div>





<!--------->
</div>
<!---->
</div>
<footer>
    <p class="copyright">
        &nbsp;Noel Bustillos &copy;2026 
    </p>
</footer>
<script src="assets/js/myscript.js"></script>
</body>
</html>
